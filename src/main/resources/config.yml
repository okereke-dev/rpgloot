# Master switch for combat stats and set bonuses.
# When false, RPGLoot items keep their rarity name, color, and lore tag but
# grant NO attribute bonuses, bonus stats, or set bonuses — pure cosmetic
# rarity system layered on top of unmodified vanilla combat.
stats-enabled: true

# Chance that a hostile mob drops a rarity item on death (0.0 - 1.0)
drop-chance: 0.20

# How bonus stats are displayed in item lore
# Options: percentage | absolute | mixed
stat-display: percentage

# Show floating damage numbers in combat (true/false)
damage-numbers: true

# Server-wide announcement when a player finds a rare item from a mob/boss kill.
# Never triggers for structure loot (no "finder" at chest-generation time).
broadcast:
  enabled: true
  # Minimum rarity that triggers an announcement: COMMON | UNCOMMON | RARE | HERO | LEGENDARY
  min-rarity: HERO
  sound: true
  firework: true

# Drop chance per rarity (%) — must add up to 100
rarity-weights:
  common: 50
  uncommon: 30
  rare: 13
  hero: 5
  legendary: 2

# Optional integration with RPGMood: if a hostile mob was scaled by RPGMood's difficulty
# system, this raises the minimum rarity floor for its drop based on its RPGMood level.
# No effect at all if RPGMood isn't installed. Each entry means "at this mob level or
# higher, the drop's minimum rarity becomes this tier" — the highest threshold met wins.
rpgmood-integration:
  enabled: true
  level-thresholds:
    UNCOMMON: 10
    RARE: 20
    HERO: 30
    LEGENDARY: 40

# Items injected into vanilla structure chests on first generation
structure-loot:
  enabled: true
  # Probability that a recognized structure chest receives an RPGLoot item (0.0 - 1.0)
  inject-chance: 0.45
  # Max rarity per structure loot table. Add new keys here to recognize additional vanilla
  # loot tables (or modded ones) without recompiling — the key is the loot table's path minus
  # the "minecraft:" namespace, e.g. "chests/end_city_treasure".
  max-rarity:
    chests/simple_dungeon: UNCOMMON
    chests/abandoned_mineshaft: UNCOMMON
    chests/desert_pyramid: RARE
    chests/jungle_temple: RARE
    chests/stronghold_corridor: RARE
    chests/stronghold_library: RARE
    chests/woodland_mansion: HERO
    chests/pillager_outpost: RARE
    chests/shipwreck_supply: UNCOMMON
    chests/bastion_treasure: HERO
    chests/ruined_portal: RARE
    chests/end_city_treasure: LEGENDARY
    chests/ancient_city: LEGENDARY

# Hostile (non-boss) mobs have a chance to spawn already wielding/wearing an RPGLoot item —
# visible loot signal before a kill even happens, separate from and additive to drop-chance
# above. Rarity is rolled through the same rpgmood-integration level floor as normal drops,
# so this doesn't make good items any easier to get — only more visible. If the mob dies, the
# item it's wearing is what drops (100% drop chance for that specific slot).
mob-equip:
  enabled: true
  chance: 0.15

# Boss drops — guaranteed RPGLoot weapon on death
# min-rarity and max-rarity define the rarity range (inclusive)
boss-drops:
  enabled: true
  warden:
    chance: 1.0
    min-rarity: RARE
    max-rarity: LEGENDARY
  wither:
    chance: 1.0
    min-rarity: RARE
    max-rarity: LEGENDARY
  elder-guardian:
    chance: 0.8
    min-rarity: RARE
    max-rarity: HERO
  ender-dragon:
    chance: 1.0
    min-rarity: RARE
    max-rarity: LEGENDARY

# Hand-authored, one-of-a-kind items with fixed names/lore/stats, each tied to a
# specific boss with a small independent chance to replace its normal Hero+/Legendary
# drop. See the wiki's Artifacts page for the full list.
artifact-drops:
  enabled: true

# ══════════════════════════════════════════════════════════════════════
# ADVANCED BALANCE TUNING
# Everything below controls how strong RPGLoot items are. Defaults match
# the tested, vanilla-friendly values shipped with the plugin — edit only
# if you want a more powerful or more subtle RPG experience.
# All values are [min, max] and a random number is rolled in that range.
# ══════════════════════════════════════════════════════════════════════

# Damage/speed/armor multiplier applied over the item's vanilla base stat, per rarity tier.
# Example: COMMON damage [1.05, 1.05] means a Common item deals exactly 5% more than vanilla.
# Armor has its own (larger) range — a helmet/boots' vanilla base is small (2.0), so it needs
# a bigger percentage than weapon damage to actually read as "better than vanilla" on the HUD.
rarity-multipliers:
  COMMON:    { damage: [1.05, 1.05], speed: [1.00, 1.00], armor: [1.15, 1.15] }
  UNCOMMON:  { damage: [1.05, 1.10], speed: [1.00, 1.05], armor: [1.15, 1.25] }
  RARE:      { damage: [1.10, 1.20], speed: [1.00, 1.10], armor: [1.25, 1.40] }
  HERO:      { damage: [1.20, 1.30], speed: [1.05, 1.15], armor: [1.40, 1.60] }
  LEGENDARY: { damage: [1.30, 1.40], speed: [1.10, 1.20], armor: [1.60, 1.85] }

# Bonus stat value ranges per rarity tier. Common items never roll a bonus stat.
# Units vary by stat (%, points, blocks) — see the wiki's Bonus Stats page.
