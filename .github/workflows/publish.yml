name: Publish to Modrinth and Hangar

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package -q

      - name: Publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          # Written to a file and referenced via -F data=@file rather than inlined, so
          # curl's own -F syntax (which treats ";" as a field-metadata separator) can't
          # be broken by punctuation in the release notes.
          jq -n \
            --arg name "$RELEASE_NAME" \
            --arg version_number "$RELEASE_TAG" \
            --arg changelog "$RELEASE_BODY" \
            '{
              name: $name,
              version_number: $version_number,
              changelog: $changelog,
              dependencies: [],
              game_versions: ["1.20.4","1.20.5","1.20.6","1.21","1.21.1","1.21.2","1.21.3","1.21.4","26.1.2"],
              version_type: "release",
              loaders: ["paper"],
              featured: true,
              project_id: "NmC4gGNc",
              file_parts: ["file"]
            }' > modrinth-payload.json

          curl --fail -X POST "https://api.modrinth.com/v2/version" \
            -H "Authorization: $MODRINTH_TOKEN" \
            -F "data=@modrinth-payload.json;type=application/json" \
            -F "file=@target/rpgloot.jar"

      - name: Publish to Hangar
        env:
          HANGAR_TOKEN: ${{ secrets.HANGAR_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          AUTH_RESPONSE=$(curl -s -X POST \
            "https://hangar.papermc.io/api/v1/authenticate?apiKey=$HANGAR_TOKEN" \
            -H "User-Agent: rpgloot-ci")
          echo "Auth response: $AUTH_RESPONSE"
          JWT=$(echo "$AUTH_RESPONSE" | jq -r '.token')
          echo "JWT prefix: ${JWT:0:20}..."

          # Same rationale as the Modrinth step: write to a file and reference via @file
          # rather than inlining, so ";" in the release notes can't break curl's -F parsing.
          jq -n \
            --arg version "$RELEASE_TAG" \
            --arg changelog "$RELEASE_BODY" \
            '{
              version: $version,
              pluginDependencies: { PAPER: [] },
              platformDependencies: {
                PAPER: ["1.20.4","1.20.5","1.20.6","1.21","1.21.1","1.21.2","1.21.3","1.21.4","26.1.2"]
              },
              description: $changelog,
              files: [{ fileInfo: null, externalUrl: null, platforms: ["PAPER"] }],
              channel: "Release"
            }' > hangar-payload.json

          UPLOAD_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://hangar.papermc.io/api/v1/projects/okereke-dev/RPGLoot/upload" \
            -H "Authorization: HangarAuth $JWT" \
            -H "User-Agent: rpgloot-ci" \
            -F "versionUpload=@hangar-payload.json;type=application/json" \
            -F "files=@target/rpgloot.jar;type=application/java-archive")
          echo "Upload response: $UPLOAD_RESPONSE"
          HTTP_STATUS=$(echo "$UPLOAD_RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Upload failed with HTTP $HTTP_STATUS"
            exit 1
          fi
